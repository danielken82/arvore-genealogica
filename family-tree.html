<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Árvore Genealógica</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ecdfc0; --surface: #f4ead0; --card: #fbf4e2; --card-h: #fff8ea;
    --border: #c9b48a; --gold: #a8732e; --gold-dim: #8a5e26;
    --text: #3d2e1f; --muted: #7a6650; --danger: #b03b3b;
    --ink: #2c2014;
    --male: #2e5a82; --male-bg: #dde9f2; --male-border: #9bb8d4;
    --female: #a8395a; --female-bg: #f5dde3; --female-border: #d99cae;
    --gen3: #4a7a3a; --gen3-bg: #e3edd8; --gen3-border: #a8c98e;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
  header {
    padding: 22px 32px 18px;
    border-bottom: 3px double var(--gold-dim);
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(180deg, var(--surface), var(--bg));
    position: relative;
  }
  header h1 {
    font-family: 'Playfair Display', serif; font-size: 1.9rem; font-weight: 700;
    color: var(--ink); letter-spacing: 0.04em; text-transform: uppercase;
  }
  header .subtitle { font-size: 0.75rem; color: var(--gold-dim); letter-spacing: 0.05em; margin-top: 2px; font-style: italic; }
  #save-status { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.06em; }
  .layout { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 57px); }
  #canvas-wrap {
    flex: 1; position: relative; overflow: auto;
    background-color: var(--bg);
  }
  #bg-decor { position: absolute; top: 0; left: 0; right: 0; height: 100%; min-height: 100%; pointer-events: none; overflow: visible; z-index: 0; }
  #bg-decor svg { position: absolute; top: 0; }
  .flag-watermark {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 320px;
    z-index: 0;
    opacity: 0.4;
    pointer-events: none;
  }
  .flag-watermark.left { left: 24px; }
  .flag-watermark.right { right: 320px; }
  .flag-watermark svg { display: block; border-radius: 6px; width: 100%; height: auto; }
  @media (max-width: 1100px) {
    .flag-watermark { width: 200px; opacity: 0.3; }
    .flag-watermark.right { right: 24px; }
  }
  @media (max-width: 768px) {
    .flag-watermark { display: none; }
  }
  #svg-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; }
  #tree-root { position: relative; width: max-content; min-width: 100%; min-height: 100%; padding: 40px; z-index: 2; margin: 0 auto; }
  .gen-row { display: flex; justify-content: center; gap: 20px; position: relative; width: max-content; margin: 0 auto; }
  .gen-spacer { height: 70px; }
  .person-card {
    position: relative; width: 142px; background: var(--card);
    border: 2px solid var(--male-border); border-radius: 8px;
    padding: 10px 10px 9px; text-align: center; cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s, box-shadow 0.2s;
    user-select: none; box-shadow: 0 1px 3px rgba(60,40,20,0.12);
    display: flex; align-items: center; gap: 9px; text-align: left;
  }
  .person-card:hover { background: var(--card-h); transform: translateY(-2px); box-shadow: 0 4px 10px rgba(60,40,20,0.18); }
  .person-card.selected { border-color: var(--gold); box-shadow: 0 0 0 2px var(--gold); }
  .person-card.gender-f { border-color: var(--female-border); }
  .person-card.gender-o { border-color: var(--gen3-border); }
  .avatar {
    width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.95rem; font-weight: 700; color: #fff; overflow: hidden;
    border: 2px solid rgba(255,255,255,0.6);
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .card-info { flex: 1; min-width: 0; }
  .person-name { font-family: 'Playfair Display', serif; font-size: 0.84rem; font-weight: 600; line-height: 1.25; color: var(--ink); margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .person-years { font-size: 0.66rem; color: var(--muted); letter-spacing: 0.02em; }
  .gen-badge { position: absolute; top: -7px; right: -7px; width: 17px; height: 17px; border-radius: 50%; font-size: 0.58rem; font-weight: 700; display: flex; align-items: center; justify-content: center; color: #fff; border: 2px solid var(--bg); }
  .flag-badge { position: absolute; top: -7px; left: -7px; width: 20px; height: 20px; border-radius: 50%; background: var(--card); border: 2px solid var(--bg); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
  #sidebar { width: 300px; flex-shrink: 0; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; text-align: center; gap: 12px; color: var(--muted); }
  .empty-state svg { opacity: 0.3; }
  .empty-state p { font-size: 0.82rem; line-height: 1.6; }
  #edit-panel { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .field label { display: block; font-size: 0.7rem; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
  .field input, .field select { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.82rem; outline: none; transition: border-color 0.2s; }
  .field input:focus, .field select:focus { border-color: var(--gold-dim); }
  .field select option { background: var(--card); }
  .photo-upload-area { position: relative; width: 80px; height: 80px; margin: 0 auto; cursor: pointer; }
  .photo-preview { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); display: block; }
  .photo-placeholder { width: 80px; height: 80px; border-radius: 50%; border: 2px dashed var(--gold-dim); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px; color: var(--muted); font-size: 0.65rem; text-align: center; }
  .photo-placeholder:hover { border-color: var(--gold); background: var(--card-h); }
  .photo-remove { position: absolute; top: -4px; right: -4px; width: 20px; height: 20px; border-radius: 50%; background: var(--danger); color: #fff; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--surface); }
  .color-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-dot { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s, transform 0.15s; }
  .color-dot:hover { transform: scale(1.15); }
  .color-dot.active { border-color: var(--gold); }
  .btn-row { display: flex; gap: 8px; }
  button { font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 500; cursor: pointer; border: none; border-radius: 6px; padding: 8px 14px; transition: opacity 0.15s, background 0.15s; }
  button:hover { opacity: 0.85; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-add-child { margin: 0 20px 20px; background: var(--card); color: var(--gold); border: 1px dashed var(--gold-dim); width: calc(100% - 40px); padding: 9px; font-size: 0.78rem; text-align: center; }
  .btn-add-child:hover { background: var(--card-h); }
  hr.divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }
  .relations-section { padding: 0 20px 20px; }
  .relations-section h3 { font-size: 0.68rem; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .rel-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--card); border-radius: 6px; margin-bottom: 6px; cursor: pointer; border: 1px solid transparent; transition: border-color 0.15s; font-size: 0.78rem; }
  .rel-item:hover { border-color: var(--border); }
  .rel-avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; color: #fff; }
  .rel-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .rel-name { flex: 1; }
  .rel-role { font-size: 0.68rem; color: var(--muted); }
  #toolbar { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 32px; padding: 10px 18px; z-index: 100; box-shadow: 0 8px 24px rgba(60,40,20,0.25); }
  #toolbar button { background: transparent; color: var(--text); font-size: 0.75rem; padding: 6px 12px; border-radius: 20px; }
  #toolbar button:hover { background: var(--card); opacity: 1; }
  #toolbar .sep { width: 1px; height: 20px; background: var(--border); }
  #toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--card); border: 1px solid var(--border); color: var(--text); font-size: 0.78rem; padding: 8px 18px; border-radius: 20px; opacity: 0; transition: opacity 0.25s, transform 0.25s; pointer-events: none; white-space: nowrap; z-index: 200; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 999; padding: 20px; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px 24px; max-width: 340px; width: 100%; text-align: center; display: flex; flex-direction: column; gap: 14px; }
  .modal h2 { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--gold); }
  .modal p { font-size: 0.82rem; color: var(--muted); line-height: 1.6; }
  .modal input { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 10px; color: var(--text); font-family: monospace; font-size: 0.85rem; outline: none; width: 100%; text-align: center; }
  .modal input:focus { border-color: var(--gold-dim); }
  .btn-gold { background: var(--gold); color: #1a1612; border: none; border-radius: 8px; padding: 11px; font-weight: 600; cursor: pointer; font-size: 0.85rem; font-family: 'Inter', sans-serif; }
  .btn-muted { background: var(--card); color: var(--muted); border: 1px solid var(--border); border-radius: 8px; padding: 8px; cursor: pointer; font-size: 0.78rem; font-family: 'Inter', sans-serif; }
  .tree-id-display { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-family: monospace; font-size: 1.1rem; letter-spacing: 0.15em; color: var(--gold); font-weight: 700; }

  #sidebar-close { display: none; }

  @media (max-width: 768px) {
    header { padding: 12px 16px; }
    header h1 { font-size: 1.05rem; }
    #toolbar { bottom: 16px; padding: 8px 10px; gap: 4px; max-width: calc(100vw - 24px); overflow-x: auto; }
    #toolbar button { font-size: 0.68rem; padding: 6px 9px; white-space: nowrap; }

    .layout { position: relative; }
    #canvas-wrap { width: 100%; }

    #sidebar {
      position: fixed;
      top: auto;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      max-height: 82vh;
      border-left: none;
      border-top: 1px solid var(--border);
      border-radius: 18px 18px 0 0;
      box-shadow: 0 -8px 32px rgba(0,0,0,0.6);
      transform: translateY(100%);
      transition: transform 0.28s ease;
      z-index: 150;
    }
    #sidebar.open { transform: translateY(0); }
    #sidebar:not(.open) { display: flex; } /* keep mounted, just slid away */

    .empty-state { display: none !important; }

    #sidebar-close {
      display: flex;
      align-items: center;
      justify-content: center;
      position: sticky;
      top: 0;
      background: var(--surface);
      padding: 10px 0 4px;
      z-index: 2;
    }
    #sidebar-close .grip { width: 36px; height: 4px; border-radius: 4px; background: var(--border); }

    #sidebar-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 140;
    }
    #sidebar-backdrop.show { display: block; }

    .person-card { width: 122px; padding: 11px 9px 9px; }
    .avatar { width: 48px; height: 48px; font-size: 1.1rem; }
    .person-name { font-size: 0.76rem; }
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>Árvore Genealógica</h1>
    <div class="subtitle">Raízes que florescem, gerações que continuam</div>
  </div>
  <span id="save-status">não salvo</span>
</header>
<div class="layout">
  <div id="canvas-wrap">
    <div class="flag-watermark left">
      <svg viewBox="0 0 900 600">
        <rect width="900" height="600" fill="#bc3a3a"/>
        <rect width="900" height="200" fill="#ffffff"/>
        <rect y="400" width="900" height="200" fill="#ffffff"/>
        <circle cx="450" cy="300" r="180" fill="#bc3a3a"/>
      </svg>
    </div>
    <div class="flag-watermark right">
      <svg viewBox="0 0 900 630">
        <rect width="900" height="630" fill="#4f9b4f"/>
        <polygon points="450,60 850,315 450,570 50,315" fill="#e8c44a"/>
        <circle cx="450" cy="315" r="140" fill="#2b4d8f"/>
        <path d="M310,315 a140,140 0 0 1 280,0" fill="none" stroke="#ffffff" stroke-width="10"/>
      </svg>
    </div>
    <div id="bg-decor">
      <!-- Left side: Okinawa / Japan motifs — repeating seigaiha waves, hibiscus, shisa-inspired sun -->
      <svg width="380" height="100%" style="left:0; top:0; opacity:0.16;" preserveAspectRatio="none">
        <defs>
          <pattern id="seigaiha" width="68" height="34" patternUnits="userSpaceOnUse">
            <path d="M0,34 A34,34 0 0 1 34,0 A34,34 0 0 1 68,34" fill="none" stroke="#c4675f" stroke-width="1.6"/>
            <path d="M0,34 A24,24 0 0 1 24,10 A24,24 0 0 1 48,34" fill="none" stroke="#c4675f" stroke-width="1.2" opacity="0.7"/>

        <rect x="0" y="0" width="380" height="100%" fill="#1a1612" opacity="0.55"/>
      </svg>
      <svg width="380" height="100%" style="left:0; top:0; opacity:0.13;" preserveAspectRatio="none">
        <defs>
          <pattern id="hibiscusPattern" width="200" height="300" patternUnits="userSpaceOnUse">
            <g transform="translate(60,80)" stroke="#b8567a" stroke-width="1.4" fill="none">

              <circle r="8" fill="#c9a84c" stroke="none"/>
            </g>
            <g transform="translate(150,220)" stroke="#d96b5f" stroke-width="1.6" fill="none">
              <circle r="22" fill="#e8e2d4" fill-opacity="0.08"/>
              <g stroke-linecap="round">
                <line x1="0" y1="-34" x2="0" y2="-26"/>
                <line x1="0" y1="34" x2="0" y2="26"/>
                <line x1="-34" y1="0" x2="-26" y2="0"/>
                <line x1="34" y1="0" x2="26" y2="0"/>
                <line x1="-24" y1="-24" x2="-18" y2="-18"/>
                <line x1="24" y1="-24" x2="18" y2="-18"/>
                <line x1="-24" y1="24" x2="-18" y2="18"/>
                <line x1="24" y1="24" x2="18" y2="18"/>
              </g>
            </g>
          </pattern>
        </defs>
        <rect x="0" y="0" width="380" height="100%" fill="url(#hibiscusPattern)"/>
      </svg>
      <!-- Right side: Brazil motifs — repeating sun rays, monstera/banana leaves, generic coast -->
      <svg width="380" height="100%" style="right:0; top:0; opacity:0.16;" preserveAspectRatio="none">
        <defs>
          <pattern id="brazilPattern" width="180" height="320" patternUnits="userSpaceOnUse">
            <g transform="translate(40,60)" fill="none" stroke="#7a9b6e" stroke-width="1.8">
              <circle r="30" fill="#e8c44a" fill-opacity="0.06"/>
              <g stroke-linecap="round" stroke="#d4b54a">
                <line x1="0" y1="-48" x2="0" y2="-36"/>
                <line x1="0" y1="48" x2="0" y2="36"/>
                <line x1="-48" y1="0" x2="-36" y2="0"/>
                <line x1="48" y1="0" x2="36" y2="0"/>
                <line x1="-34" y1="-34" x2="-26" y2="-26"/>
                <line x1="34" y1="-34" x2="26" y2="-26"/>
                <line x1="-34" y1="34" x2="-26" y2="26"/>
                <line x1="34" y1="34" x2="26" y2="26"/>
              </g>
            </g>
            <g transform="translate(130,170)" fill="#7a9b6e" opacity="0.9">
              <path d="M0,0 C45,-15 70,-55 55,-100 C28,-68 6,-42 0,0 Z"/>
            </g>
            <g transform="translate(40,230) scale(1.1)" fill="#7a9b6e" opacity="0.85">
              <path d="M0,0 C-40,-12 -60,-48 -44,-88 C-20,-60 -4,-38 0,0 Z"/>
            </g>
            <g transform="translate(150,40) scale(0.8)" fill="#c9a84c" opacity="0.7">
              <path d="M0,0 C30,-10 46,-38 36,-68 C16,-46 4,-30 0,0 Z"/>
            </g>
          </pattern>
        </defs>
        <rect x="0" y="0" width="380" height="100%" fill="url(#brazilPattern)"/>
        <rect x="0" y="0" width="380" height="100%" fill="#1a1612" opacity="0.5"/>
      </svg>
    </div>
    <svg id="svg-canvas"></svg>
    <div id="tree-root"></div>
  </div>
  <div id="sidebar-backdrop" onclick="closeSidebar()"></div>
  <aside id="sidebar">
    <div id="sidebar-close" onclick="closeSidebar()"><div class="grip"></div></div>
    <div id="empty-state" class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <circle cx="12" cy="7" r="4"/><path d="M5.5 20a6.5 6.5 0 0113 0"/>
      </svg>
      <p>Selecione uma pessoa para editar.</p>
    </div>
    <div id="edit-panel" style="display:none"></div>
  </aside>
</div>
<div id="toolbar">
  <button onclick="addRootPerson()">＋ Pessoa</button>
  <div class="sep"></div>
  <button onclick="saveToCloud()" style="background:var(--gold);color:#1a1612;border-radius:20px;font-weight:600;">💾 Salvar</button>
  <button onclick="showOpenModal()">📂 Abrir</button>
  <div class="sep"></div>
  <button onclick="exportData()" title="Exportar JSON">↓</button>
  <button onclick="importData()" title="Importar JSON">↑</button>
</div>
<div id="toast"></div>

  const c = COUNTRIES.find(x => x[0] === code);
  return c ? c[1] : '';
}
let people = [], selectedId = null, nextId = 1;
let currentTreeId = localStorage.getItem('arvore_tree_id') || null;

function uid() { return nextId++; }
function get(id) { return people.find(p => p.id === id); }
function initials(name) { return name.split(' ').filter(Boolean).map(w=>w[0]).join('').slice(0,2).toUpperCase() || '?'; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function setStatus(msg) {

}

function genTreeId() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length: 6}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
}

// ── FIREBASE SAVE / LOAD ──
window.saveToCloud = async function() {
  if (!currentTreeId) currentTreeId = genTreeId();
  setStatus('salvando...');
  try {
    // Strip photos to avoid size limits — save separately if needed
    const payload = { people: people.map(p => ({...p, photo: p.photo ? '__has_photo__' : null})), nextId, photos: {} };
    people.forEach(p => { if (p.photo) payload.photos[p.id] = p.photo; });
    await setDoc(doc(db, 'trees', currentTreeId), payload);
    localStorage.setItem('arvore_tree_id', currentTreeId);
    setStatus('salvo ✓');
    showSaveModal(currentTreeId);
  } catch(e) {
    setStatus('erro ao salvar');
    showToast('Erro ao salvar: ' + e.message);
  }
};

async function loadFromCloud(treeId) {
  setStatus('carregando...');
  try {
    const snap = await getDoc(doc(db, 'trees', treeId));
    if (!snap.exists()) { showToast('Código não encontrado.'); setStatus(''); return; }
    const data = snap.data();
    people = data.people.map(p => ({...p, photo: data.photos && data.photos[p.id] ? data.photos[p.id] : null}));
    nextId = data.nextId;
    currentTreeId = treeId;
    localStorage.setItem('arvore_tree_id', treeId);
    selectedId = null;
    renderTree(); renderSidebar();
    setStatus('salvo ✓');
    showToast('Árvore carregada!');
  } catch(e) {
    setStatus('erro');
    showToast('Erro ao carregar: ' + e.message);
  }
}

function addPerson(data) {

// ── TREE LAYOUT ──
function buildGenerations() {
  const gen = {}, visited = new Set();
  function assign(id, depth) {
    if (visited.has(id)) return;
    visited.add(id);
    if (!gen[depth]) gen[depth] = [];
    gen[depth].push(id);
    people.filter(p => p.parentId === id).forEach(c => assign(c.id, depth + 1));
    const p = get(id);
    if (p && p.spouseId && !visited.has(p.spouseId)) assign(p.spouseId, depth);
  }
  people.filter(p => !p.parentId).forEach(r => assign(r.id, 0));
  people.forEach(p => { if (!visited.has(p.id)) assign(p.id, 0); });
  return gen;
}

function orderBySpouse(ids) {
  const result = [], used = new Set();
  ids.forEach(id => {
    if (used.has(id)) return;
    result.push(id); used.add(id);
    const p = get(id);
    if (p && p.spouseId && ids.includes(p.spouseId) && !used.has(p.spouseId)) { result.push(p.spouseId); used.add(p.spouseId); }
  });
  return result;
}

let cardPositions = {};

function renderTree() {
  const root = document.getElementById('tree-root');
  root.innerHTML = ''; cardPositions = {};
  const gens = buildGenerations();
  Object.keys(gens).map(Number).sort((a,b)=>a-b).forEach((d, di) => {
    if (di > 0) { const sp = document.createElement('div'); sp.className = 'gen-spacer'; root.appendChild(sp); }
    const row = document.createElement('div'); row.className = 'gen-row';
    orderBySpouse(gens[d]).forEach(id => { const p = get(id); if (p) row.appendChild(makeCard(p, d)); });
    root.appendChild(row);
  });
  requestAnimationFrame(() => { drawLines(); resizeBgDecor(); });
}

function resizeBgDecor() {
  const root = document.getElementById('tree-root');
  const decor = document.getElementById('bg-decor');
  const wrap = document.getElementById('canvas-wrap');
  if (!root || !decor) return;
  const h = Math.max(root.scrollHeight, wrap.clientHeight);
  decor.style.height = h + 'px';
  decor.querySelectorAll('svg').forEach(svg => svg.setAttribute('height', h));
}

function genderColor(g) {
  if (g === 'f') return 'var(--female)';
  if (g === 'o') return 'var(--gen3)';
  return 'var(--male)';
}

function makeCard(p, depth) {
  const card = document.createElement('div');
  const genderClass = p.gender === 'f' ? ' gender-f' : (p.gender === 'o' ? ' gender-o' : ' gender-m');
  card.className = 'person-card' + genderClass + (p.id === selectedId ? ' selected' : '');
  card.dataset.id = p.id;
  card.onclick = () => selectPerson(p.id);
  const av = document.createElement('div'); av.className = 'avatar';
  if (p.photo) { const img = document.createElement('img'); img.src = p.photo; av.appendChild(img); }
  else { av.style.background = genderColor(p.gender); av.textContent = initials(p.name); }
  const info = document.createElement('div'); info.className = 'card-info';
  const name = document.createElement('div'); name.className = 'person-name'; name.textContent = p.name;
  const years = document.createElement('div'); years.className = 'person-years';
  years.textContent = [p.birth, p.death ? '†'+p.death : ''].filter(Boolean).join(' – ') || '—';
  info.append(name, years);
  const badge = document.createElement('div'); badge.className = 'gen-badge';
  badge.style.background = genderColor(p.gender); badge.textContent = depth + 1;
  if (p.nationality) {
    const flag = document.createElement('div'); flag.className = 'flag-badge';
    flag.innerHTML = `<img src="${flagUrlFor(p.nationality)}" alt="${p.nationality}" style="width:16px;height:12px;object-fit:cover;border-radius:2px;">`;
    flag.title = countryNameFor(p.nationality);
    card.appendChild(flag);
  }
  card.append(av, info, badge);
  return card;
}

function drawLines() {
  const svg = document.getElementById('svg-canvas');
  const wrap = document.getElementById('canvas-wrap');
  svg.setAttribute('width', wrap.scrollWidth); svg.setAttribute('height', wrap.scrollHeight);
  svg.innerHTML = `<defs>
    <linearGradient id="branchGrad" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0%" stop-color="#6b5238"/>
      <stop offset="45%" stop-color="#4a3a26"/>
      <stop offset="100%" stop-color="#2e2418"/>
    </linearGradient>
    <linearGradient id="trunkGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5c4830"/>
      <stop offset="50%" stop-color="#4a3a26"/>
      <stop offset="100%" stop-color="#3a2e1f"/>
    </linearGradient>
    <radialGradient id="leafGrad" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#8fae6f"/>
      <stop offset="100%" stop-color="#5a7a48"/>
    </radialGradient>
    <radialGradient id="sakuraGrad" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#fbdce4"/>
      <stop offset="100%" stop-color="#e89aab"/>
    </radialGradient>
  </defs>`;
  document.querySelectorAll('.person-card').forEach(el => {
    const id = +el.dataset.id, r = el.getBoundingClientRect(), wr = wrap.getBoundingClientRect();
    cardPositions[id] = { x: r.left-wr.left+wrap.scrollLeft, y: r.top-wr.top+wrap.scrollTop, w: r.width, h: r.height };
  });

  function leaf(x, y, size, angle, opacity) {
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('transform', `translate(${x},${y}) rotate(${angle})`);
    g.setAttribute('opacity', opacity);
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M0,0 C${size*0.6},-${size*0.5} ${size*1.1},-${size*0.2} ${size*1.4},0 C${size*1.1},${size*0.2} ${size*0.6},${size*0.5} 0,0 Z`);
    path.setAttribute('fill', 'url(#leafGrad)');
    g.appendChild(path);
    const vein = document.createElementNS('http://www.w3.org/2000/svg','line');
    vein.setAttribute('x1', 0); vein.setAttribute('y1', 0);
    vein.setAttribute('x2', size*1.3); vein.setAttribute('y2', 0);
    vein.setAttribute('stroke', '#3d5530'); vein.setAttribute('stroke-width', '0.6');
    g.appendChild(vein);
    svg.appendChild(g);
  }

  function sakura(x, y, size, opacity) {
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('transform', `translate(${x},${y})`);
    g.setAttribute('opacity', opacity);
    for (let i = 0; i < 5; i++) {
      const petal = document.createElementNS('http://www.w3.org/2000/svg','path');
      const a = i * 72;
      petal.setAttribute('d', `M0,0 C${size*0.5},-${size*0.3} ${size*0.5},-${size*0.9} 0,-${size} C-${size*0.5},-${size*0.9} -${size*0.5},-${size*0.3} 0,0 Z`);
      petal.setAttribute('transform', `rotate(${a})`);
      petal.setAttribute('fill', 'url(#sakuraGrad)');
      g.appendChild(petal);
    }
    const center = document.createElementNS('http://www.w3.org/2000/svg','circle');
    center.setAttribute('r', size*0.22); center.setAttribute('fill', '#d4a84c');
    g.appendChild(center);
    svg.appendChild(g);
  }

  function barkLines(d1, d2, width) {
    // subtle inner texture lines following the same curve, offset
    [0.3, 0.55, 0.78].forEach((t, i) => {
      const line = document.createElementNS('http://www.w3.org/2000/svg','path');
      line.setAttribute('d', d1);
      line.setAttribute('fill', 'none');
      line.setAttribute('stroke', '#1f1812');
      line.setAttribute('stroke-width', '0.5');
      line.setAttribute('opacity', 0.25 - i*0.05);
      svg.appendChild(line);
    });
  }

  // Group children by their parent-pair "trunk point" so siblings share one branch from a common fork.
  const branchGroups = {};
  people.forEach(p => {
    if (!p.parentId) return;
    const parent = get(p.parentId); if (!parent) return;
    const key = parent.spouseId ? [parent.id, parent.spouseId].sort().join('-') : String(parent.id);
    if (!branchGroups[key]) branchGroups[key] = { parent, children: [] };
    branchGroups[key].children.push(p);
  });

  Object.values(branchGroups).forEach(({ parent, children }) => {
    const pp = cardPositions[parent.id]; if (!pp) return;
    let px = pp.x + pp.w/2, py = pp.y + pp.h;
    if (parent.spouseId) {
      const sp = cardPositions[parent.spouseId];
      if (sp) { px = (px + sp.x + sp.w/2) / 2; py = Math.max(py, sp.y + sp.h); }
    }

    const validKids = children.map(c => cardPositions[c.id]).filter(Boolean);
    if (!validKids.length) return;

    // Fork point: a bit below the parent(s), organic curve down then out
    const forkY = py + 38;
    const trunkWidth = Math.min(11, 5 + validKids.length * 1.1);
    const wobble = (Math.random() - 0.5) * 8;

    // Trunk segment from parent down to fork — thicker, with bark texture
    const trunkPath = `M${px-trunkWidth/2},${py} C${px-trunkWidth/2+wobble},${py+14} ${px-trunkWidth/2-wobble},${forkY-14} ${px-trunkWidth*0.4},${forkY} L${px+trunkWidth*0.4},${forkY} C${px+trunkWidth/2-wobble},${forkY-14} ${px+trunkWidth/2+wobble},${py+14} ${px+trunkWidth/2},${py} Z`;
    const trunk = document.createElementNS('http://www.w3.org/2000/svg','path');
    trunk.setAttribute('d', trunkPath);
    trunk.setAttribute('fill', 'url(#trunkGrad)');
    trunk.setAttribute('opacity', '0.92');
    svg.appendChild(trunk);
    barkLines(`M${px},${py} C${px+wobble*0.6},${py+14} ${px-wobble*0.6},${forkY-14} ${px},${forkY}`, null, trunkWidth);

    // Small knot/burl detail on trunk
    const knot = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
    knot.setAttribute('cx', px + trunkWidth*0.25); knot.setAttribute('cy', (py+forkY)/2);
    knot.setAttribute('rx', 2.2); knot.setAttribute('ry', 3.4);
    knot.setAttribute('fill', '#241c13'); knot.setAttribute('opacity', '0.5');
    svg.appendChild(knot);

    // Branch out to each child as a tapered organic curve with sub-twigs and leaves
    children.forEach((c, ci) => {
      const cp = cardPositions[c.id]; if (!cp) return;
      const cx = cp.x + cp.w/2, cy = cp.y;
      const midY = (forkY + cy) / 2;
      const seed = (px*7 + cx*3 + ci*13) % 17;
      const sway = (cx - px) * 0.22 + (seed - 8) * 1.8;
      const startW = trunkWidth * 0.5, endW = 2.2;

      const c1x = px + sway*0.32, c1y = forkY + (midY-forkY)*0.45;
      const c2x = cx - sway*0.32, c2y = cy - (cy-midY)*0.45;
      const centerline = `M${px},${forkY} C${c1x},${c1y} ${c2x},${c2y} ${cx},${cy}`;

      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d', `
        M${px-startW/2},${forkY}
        C${c1x-startW*0.4},${c1y} ${c2x-endW*0.6},${c2y} ${cx-endW/2},${cy}
        L${cx+endW/2},${cy}
        C${c2x+endW*0.6},${c2y} ${c1x+startW*0.4},${c1y} ${px+startW/2},${forkY}
        Z
      `);
      path.setAttribute('fill', 'url(#branchGrad)');
      path.setAttribute('opacity', '0.88');
      svg.appendChild(path);
      barkLines(centerline, null, startW);

      // A short secondary twig branching off the main limb, ending in leaves
      const twigT = 0.55 + (seed % 3) * 0.08;
      const twigBaseX = px + (cx-px)*twigT, twigBaseY = forkY + (cy-forkY)*twigT;
      const twigDir = (ci % 2 === 0) ? 1 : -1;
      const twigEndX = twigBaseX + twigDir * (14 + seed);
      const twigEndY = twigBaseY - (10 + seed*0.6);
      const twig = document.createElementNS('http://www.w3.org/2000/svg','path');
      twig.setAttribute('d', `M${twigBaseX},${twigBaseY} Q${twigBaseX + twigDir*8},${twigBaseY - 8} ${twigEndX},${twigEndY}`);
      twig.setAttribute('fill', 'none');
      twig.setAttribute('stroke', '#4a3a26');
      twig.setAttribute('stroke-width', '1.6');
      twig.setAttribute('stroke-linecap', 'round');
      twig.setAttribute('opacity', '0.75');
      svg.appendChild(twig);
      leaf(twigEndX, twigEndY, 9 + (seed%4), twigDir>0 ? -25 : 200, 0.65);
      sakura(twigEndX + twigDir*6, twigEndY - 4, 5 + (seed%3), 0.85);
      sakura(twigBaseX + twigDir*8, twigBaseY - 10, 4, 0.75);

      // Sakura blossoms and leaves clustered near the card connection point too
      sakura(cx - 8, cy - 9, 5, 0.8);
      sakura(cx + 9, cy - 6, 4.5, 0.75);
      leaf(cx - 2, cy - 12, 7, -150, 0.55);

      // tiny leaf-bud dot at the connection to the card
      const bud = document.createElementNS('http://www.w3.org/2000/svg','circle');
      bud.setAttribute('cx', cx); bud.setAttribute('cy', cy); bud.setAttribute('r', '2.4');
      bud.setAttribute('fill', '#6b8f5a'); bud.setAttribute('opacity', '0.8');
      svg.appendChild(bud);
    });
  });

  // Spouse connections — twisting vine instead of dashed line
  const drawn = new Set();
  people.forEach(p => {
    if (!p.spouseId) return;
    const key = [p.id,p.spouseId].sort().join('-');
    if (drawn.has(key)) return; drawn.add(key);
    const a=cardPositions[p.id], b=cardPositions[p.spouseId]; if(!a||!b) return;
    const ax=a.x+a.w, ay=a.y+a.h/2, bx=b.x, by=b.y+b.h/2;
    const midx=(ax+bx)/2;
    const vine = document.createElementNS('http://www.w3.org/2000/svg','path');
    vine.setAttribute('d', `M${ax},${ay} C${midx},${ay-8} ${midx},${by+8} ${bx},${by}`);
    vine.setAttribute('fill','none'); vine.setAttribute('stroke','#c9a84c');
    vine.setAttribute('stroke-width','1.3'); vine.setAttribute('stroke-dasharray','1 5');
    vine.setAttribute('stroke-linecap','round'); vine.setAttribute('opacity','0.75');
    svg.appendChild(vine);
  });
}

  const sel = document.createElement('select');
  [['m','♂ Masculino'],['f','♀ Feminino'],['o','◈ Outro']].forEach(([v,t]) => {
    const o = document.createElement('option'); o.value=v; o.textContent=t; if(p.gender===v) o.selected=true; sel.appendChild(o);
  });
  sel.onchange = e => { p.gender = e.target.value; refreshCard(p.id); setStatus('não salvo'); };
  genDiv.appendChild(sel); ep.appendChild(genDiv);

  const natDiv = document.createElement('div'); natDiv.className = 'field';
  natDiv.innerHTML = '<label>Nacionalidade</label>';
  const natSel = document.createElement('select');
  const natOpt0 = document.createElement('option'); natOpt0.value = ''; natOpt0.textContent = '— não definida —'; natSel.appendChild(natOpt0);
  COUNTRIES.forEach(([code, label]) => {
    const o = document.createElement('option'); o.value = code; o.textContent = label;
    if (p.nationality === code) o.selected = true;
    natSel.appendChild(o);
  });
  natSel.onchange = e => { p.nationality = e.target.value; refreshCard(p.id); setStatus('não salvo'); };
  natDiv.appendChild(natSel); ep.appendChild(natDiv);

  ep.appendChild(Object.assign(document.createElement('hr'),{className:'divider'}));

  const spouseDiv = document.createElement('div'); spouseDiv.className = 'field';
  spouseDiv.innerHTML = '<label>Cônjuge</label>';
  const spSel = document.createElement('select');
  const spOpt = document.createElement('option'); spOpt.value=''; spOpt.textContent='— sem cônjuge —'; spSel.appendChild(spOpt);
  people.filter(x=>x.id!==p.id&&x.parentId!==p.id&&p.parentId!==x.id).forEach(x=>{
    const o=document.createElement('option'); o.value=x.id; o.textContent=x.name; if(p.spouseId===x.id) o.selected=true; spSel.appendChild(o);
  });
  spSel.onchange = e => { setSpouse(p.id, e.target.value); setStatus('não salvo'); };
  spouseDiv.appendChild(spSel); ep.appendChild(spouseDiv);

  const parentDiv = document.createElement('div'); parentDiv.className = 'field';
  parentDiv.innerHTML = '<label>Pai / Mãe</label>';
  const prSel = document.createElement('select');
  const prOpt = document.createElement('option'); prOpt.value=''; prOpt.textContent='— raiz da árvore —'; prSel.appendChild(prOpt);
  people.filter(x=>x.id!==p.id&&x.id!==p.spouseId).forEach(x=>{
    const o=document.createElement('option'); o.value=x.id; o.textContent=x.name; if(p.parentId===x.id) o.selected=true; prSel.appendChild(o);
  });
  prSel.onchange = e => { setParent(p.id, e.target.value); setStatus('não salvo'); };
  parentDiv.appendChild(prSel); ep.appendChild(parentDiv);
  ep.appendChild(Object.assign(document.createElement('hr'),{className:'divider'}));

  const btnRow = document.createElement('div'); btnRow.className = 'btn-row';
  const btnDel = document.createElement('button'); btnDel.className='btn-danger'; btnDel.style.flex='1'; btnDel.textContent='Remover';
  btnDel.onclick = () => deletePerson(p.id);
  btnRow.appendChild(btnDel); ep.appendChild(btnRow);

  const children = people.filter(c=>c.parentId===p.id);
  const spouse = p.spouseId?get(p.spouseId):null;
  const parent = p.parentId?get(p.parentId):null;
  const siblings = parent?people.filter(c=>c.parentId===parent.id&&c.id!==p.id):[];
  const rels = [];
  if(spouse) rels.push([spouse,'Cônjuge']);
  if(parent) rels.push([parent,'Pai/Mãe']);
  siblings.forEach(s=>rels.push([s,'Irmão/Irmã']));
  children.forEach(c=>rels.push([c,'Filho/Filha']));
  if(rels.length) {
    const sec=document.createElement('div'); sec.className='relations-section';
    const h3=document.createElement('h3'); h3.textContent='Relações'; sec.appendChild(h3);
    rels.forEach(([rp,role])=>{
      const item=document.createElement('div'); item.className='rel-item';
      item.onclick=()=>{selectedId=rp.id;renderTree();renderSidebar();openSidebar();};
      const rav=document.createElement('div'); rav.className='rel-avatar';
      if(rp.photo){const ri=document.createElement('img');ri.src=rp.photo;rav.appendChild(ri);}
      else{rav.style.background=rp.color;rav.textContent=initials(rp.name);}
      const rname=document.createElement('div'); rname.className='rel-name'; rname.textContent=rp.name;
      const rrole=document.createElement('div'); rrole.className='rel-role'; rrole.textContent=role;
      item.append(rav,rname,rrole); sec.appendChild(item);
    });
    ep.appendChild(sec);
  }
  const btnChild=document.createElement('button'); btnChild.className='btn-add-child'; btnChild.textContent='＋ Adicionar filho(a)';
  btnChild.onclick=()=>addChild(p.id); ep.appendChild(btnChild);
}

function refreshCard(id) {
  const p=get(id); if(!p) return;
  const card=document.querySelector(`.person-card[data-id="${id}"]`); if(!card) return;
  card.classList.remove('gender-m','gender-f','gender-o');
  card.classList.add(p.gender === 'f' ? 'gender-f' : (p.gender === 'o' ? 'gender-o' : 'gender-m'));
  const av=card.querySelector('.avatar');
  if(p.photo){av.style.background='';av.innerHTML=`<img src="${p.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;}
  else{av.style.background=genderColor(p.gender);av.innerHTML=initials(p.name);}
  const badgeEl = card.querySelector('.gen-badge');
  if (badgeEl) badgeEl.style.background = genderColor(p.gender);
  card.querySelector('.person-name').textContent=p.name;
  card.querySelector('.person-years').textContent=[p.birth,p.death?'†'+p.death:''].filter(Boolean).join(' – ')||'—';
  let flagEl = card.querySelector('.flag-badge');
  if (p.nationality) {
    if (!flagEl) { flagEl = document.createElement('div'); flagEl.className = 'flag-badge'; card.appendChild(flagEl); }
    flagEl.innerHTML = `<img src="${flagUrlFor(p.nationality)}" alt="${p.nationality}" style="width:16px;height:12px;object-fit:cover;border-radius:2px;">`;
    flagEl.title = countryNameFor(p.nationality);
  } else if (flagEl) {
    flagEl.remove();
  }
}

function pickPhoto(id) {
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    // Resize to max 200px to keep Firestore happy
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const max=200, canvas=document.createElement('canvas');
        let w=img.width, h=img.height;
        if(w>h){if(w>max){h=h*max/w;w=max;}}else{if(h>max){w=w*max/h;h=max;}}
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        get(id).photo=canvas.toDataURL('image/jpeg',0.7);
        refreshCard(id); renderSidebar(); setStatus('não salvo');
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(f);
  };
  inp.click();
}

function setSpouse(id,val) {
  const p=get(id);
  if(p.spouseId){const o=get(p.spouseId);if(o)o.spouseId=null;}
  p.spouseId=val?+val:null;
  if(val){const sp=get(+val);if(sp)sp.spouseId=id;}
  renderTree(); renderSidebar();
}

function setParent(id,val) { get(id).parentId=val?+val:null; renderTree(); renderSidebar(); }

window.addRootPerson = function() {
  const id=addPerson({name:'Nova Pessoa'});
  selectedId=id; renderTree(); renderSidebar(); openSidebar(); setStatus('não salvo');
  showToast('Pessoa adicionada!');
};

function addChild(parentId) {
  const id=addPerson({name:'Novo filho(a)',gender:'o',parentId});
  selectedId=id; renderTree(); renderSidebar(); openSidebar(); setStatus('não salvo');
  showToast('Filho(a) adicionado!');
}

function deletePerson(id) {
  people.forEach(p=>{if(p.spouseId===id)p.spouseId=null;if(p.parentId===id)p.parentId=null;});
  people=people.filter(p=>p.id!==id); selectedId=null; renderTree(); renderSidebar(); setStatus('não salvo');
  if (isMobile()) closeSidebar();
}

window.exportData = function() {
  const blob=new Blob([JSON.stringify({people,nextId},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='arvore.json'; a.click();
  showToast('Exportado!');
};

window.importData = function() {
  const input=document.createElement('input'); input.type='file'; input.accept='.json';
  input.onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{
      try{const d=JSON.parse(ev.target.result);people=d.people;nextId=d.nextId;selectedId=null;renderTree();renderSidebar();setStatus('não salvo');showToast('Importado!');}
      catch{showToast('Erro ao ler arquivo.');}
    };
    r.readAsText(f);
  };
  input.click();
};

window.addEventListener('resize', ()=>requestAnimationFrame(()=>{drawLines();resizeBgDecor();}));
window.renderTree = renderTree;
window.renderSidebar = renderSidebar;

// ── INIT ──
// Priority: URL ?codigo=XXXXXX > saved localStorage code > seed example
const urlParams = new URLSearchParams(window.location.search);
const urlCode = urlParams.get('codigo');
if (urlCode && urlCode.length === 6) {
  currentTreeId = urlCode.toUpperCase();
  localStorage.setItem('arvore_tree_id', currentTreeId);
  loadFromCloud(currentTreeId);
} else if (currentTreeId) {
  loadFromCloud(currentTreeId);
} else {
  seed(); renderTree();
}
</script>
